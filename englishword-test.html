let order = [];
let currentPos = 0;
let startIndex = 0;
let endIndex = 0;

function shuffle(array) {
    for(let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function createTest() {

    startIndex = Number(document.getElementById("start").value) - 1;
    endIndex = Number(document.getElementById("end").value) - 1;

    if(isNaN(startIndex) || isNaN(endIndex)){
        alert("範囲を入力してください");
        return;
    }

    if(startIndex < 0) startIndex = 0;
    if(endIndex >= english.length) endIndex = english.length - 1;

    if(startIndex > endIndex){
        alert("開始番号と終了番号を確認してください");
        return;
    }

    order = [];

    for(let i = startIndex; i <= endIndex; i++){
        order.push(i);
    }

    shuffle(order);

    currentPos = 0;

    document.getElementById("total").textContent = order.length;

    showQuestion();
}

    const idx = order[currentPos];

    document.getElementById("current").textContent =
        currentPos + 1;

    document.getElementById("english").textContent =
        english[idx];

    document.getElementById("japanese").textContent =
        japanese[idx];

    document.getElementById("japanese").style.visibility =
        "hidden";
}

function showAnswer(){

    document.getElementById("japanese").style.visibility =
        "visible";
}

function nextQuestion(){

    currentPos++;

    showQuestion();
}

function markCorrect() {
    nextQuestion();
}

function markWrong() {

    const idx = order[currentPos];

    if (!wrongAnswers.includes(idx)) {
        wrongAnswers.push(idx);
    }

    nextQuestion();
}

function retryWrongQuestions(){

    if(wrongAnswers.length === 0){

        alert("間違えた問題はありません");

        return;
    }

    order = [...wrongAnswers];

    shuffle(order);

    wrongAnswers = [];

    currentPos = 0;

    document.getElementById("total").textContent =
        order.length;

    document.getElementById("result").textContent = "";

    showQuestion();
}

let wrongList = "<ul><h3>間違えた単語</h3>";

wrongAnswers.forEach(i => {
    wrongList += "<li>"
        + english[i]
        + " : "
        + japanese[i]
        + "</li>";
});

wrongList += "</ul>";

document.getElementById("result").innerHTML =
    wrongList;

</script>
</body>
</html>
